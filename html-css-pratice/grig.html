<!DOCTYPE html>
<html>
  <head>
    <title>grid pratice</title>
  </head>
  <body>
    <div style="
      display: grid;
      grid-template-columns: 1fr 1fr 1fr "
    >
      <div style="background-color:blue">div 1</div>
      <div style="background-color:pink">div 2</div>
    </div>
      <div style="
      margin-top:30px;
        display: grid;
        grid-template-columns: 1fr 1fr 1fr; 
        column-gap:20px;
        row-gap:40px; "
      >
        <div style="background-color:blue; height:100px;">div 1</div>
        <div style="background-color:pink; height:100px;">div 2</div>
        <div style="background-color:blue; height:100px;">div 1</div>
        <div style="background-color:pink; height:100px;">div 2</div>
        <div style="background-color:blue; height:100px;">div 1</div>
        <div style="background-color:pink; height:100px;">div 2</div>
      </div>
  </body>
</html>
